name: CI
on:
  push:
    branches:
      - "main"
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - "CITATION.cff"
      - ".github/FUNDING.yml"
      - ".gitignore"
      - "**.md"

  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkou@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add MUSL target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Build
        run: ./scripts/build.sh --linux --release
